<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>بطاقات المباريات | نمط Netflix</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Netflix Sans', 'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, 'Roboto', sans-serif;
      padding: 20px 24px 40px 24px;
      letter-spacing: 0.2px;
      min-height: 100vh;
    }

    /* رأس الصفحة مع شريط البحث فقط */
    .search-header {
      max-width: 1440px;
      margin: 0 auto 36px auto;
      display: flex;
      justify-content: center;
    }

    .search-bar {
      width: 100%;
      max-width: 480px;
      background-color: #121212;
      border: 1px solid #2c2c2c;
      border-radius: 60px;
      padding: 12px 24px;
      color: white;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      transition: all 0.25s ease;
      font-family: inherit;
      text-align: right;
      direction: rtl;
    }

    .search-bar::placeholder {
      color: #aaaaaa;
      font-weight: 400;
      font-size: 0.95rem;
    }

    .search-bar:focus {
      border-color: #ffffff;
      background-color: #1a1a1a;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
    }

    /* شبكة البطاقات - مربعات مثالية */
    .posters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 32px 24px;
      max-width: 1440px;
      margin: 0 auto;
      justify-items: center;
      align-items: start;
    }

    /* البطاقة المربعة (aspect-ratio 1/1) مثل بوستر مربع أنيق */
    .poster-card {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 260px;
      background: #0b0b0b;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #262626;
      transition: all 0.28s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.8);
      text-decoration: none;
    }

    /* صورة مربعة تمامًا 1:1 */
    .poster-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease, filter 0.3s ease;
      background-color: #111;
    }

    .poster-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: #ffffff;
      box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255,255,255,0.2);
    }

    .poster-card:hover img {
      transform: scale(1.03);
      filter: brightness(1.05);
    }

    .poster-card:active {
      transform: translateY(-2px) scale(0.99);
      transition: 0.05s linear;
    }

    /* عنوان المباراة أسفل الصورة */
    .match-title {
      padding: 14px 12px 16px;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.3px;
      background: linear-gradient(0deg, #0a0a0a 85%, #111111 100%);
      color: #f0f0f0;
      border-top: 1px solid #262626;
      transition: background 0.2s, color 0.2s;
      line-height: 1.4;
    }

    .poster-card:hover .match-title {
      background: #111111;
      color: white;
      border-top-color: #3d3d3d;
    }

    /* زر الصفحة الرئيسية (ثابت أسفل يمين) */
    .home-button {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #0f0f0f;
      border: 1.8px solid #ffffff;
      border-radius: 60px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
      z-index: 1100;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
      background-color: rgba(10, 10, 10, 0.85);
    }

    .home-button:hover {
      background: #1f1f1f;
      border-color: #fff;
      transform: scale(1.02);
      box-shadow: 0 10px 24px black;
    }

    .home-button svg {
      width: 26px;
      height: 26px;
      fill: white;
      transition: transform 0.2s;
    }

    .home-button:active svg {
      transform: scale(0.94);
    }

    /* رسالة عدم وجود نتائج */
    .no-results {
      text-align: center;
      grid-column: 1 / -1;
      padding: 60px 20px;
      font-size: 1.2rem;
      color: #aaa;
      background: #050505;
      border-radius: 32px;
      margin-top: 20px;
      border: 1px dashed #2c2c2c;
    }

    /* استجابة للشاشات الصغيرة */
    @media (max-width: 640px) {
      body {
        padding: 16px 16px 70px 16px;
      }
      .posters-grid {
        gap: 20px 16px;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
      .match-title {
        font-size: 0.8rem;
        padding: 10px 8px 12px;
      }
      .search-bar {
        padding: 10px 20px;
        font-size: 0.9rem;
        max-width: 95%;
      }
      .home-button {
        bottom: 16px;
        right: 16px;
        padding: 8px 16px;
      }
      .home-button svg {
        width: 22px;
        height: 22px;
      }
    }

    @media (min-width: 1024px) {
      .posters-grid {
        grid-template-columns: repeat(5, minmax(190px, 220px));
        justify-content: center;
      }
    }

    @media (orientation: landscape) and (max-height: 600px) {
      .posters-grid {
        gap: 16px;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
      .match-title {
        padding: 6px 6px 8px;
        font-size: 0.75rem;
      }
    }

    img {
      pointer-events: none;
    }
  </style>
</head>

    // إنشاء بطاقة مربعة
    function createPosterCard(match) {
      const card = document.createElement('div');
      card.className = 'poster-card';
      card.addEventListener('click', () => {
        window.location.href = match.link;
      });
      const img = document.createElement('img');
      img.src = match.imgSrc;
      img.alt = match.title;
      img.loading = "lazy";
      const titleDiv = document.createElement('div');
      titleDiv.className = 'match-title';
      titleDiv.textContent = match.title;
      card.appendChild(img);
      card.appendChild(titleDiv);
      return card;
    }

    const grid = document.getElementById('postersGrid');
    const searchInput = document.getElementById('searchInput');

    function render(filter = '') {
      grid.innerHTML = '';
      const lowerFilter = filter.trim().toLowerCase();
      const filtered = lowerFilter === '' ? matchesData : matchesData.filter(m => m.title.toLowerCase().includes(lowerFilter));
      if (filtered.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'no-results';
        emptyMsg.textContent = '⚽ لا توجد مباراة تطابق البحث';
        grid.appendChild(emptyMsg);
        return;
      }
      filtered.forEach(m => grid.appendChild(createPosterCard(m)));
    }

    searchInput.addEventListener('input', (e) => render(e.target.value));
    render('');
